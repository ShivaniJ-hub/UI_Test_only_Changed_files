name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  changed_files:
    runs-on: ubuntu-latest # windows-latest || macos-latest
    name: Test changed-files
    steps:
      - uses: actions/checkout@v4

      # -----------------------------------------------------------------------------------------------------------
      # Example 1
      # -----------------------------------------------------------------------------------------------------------
      - name: Base SHA
        id: base-sha
        run: echo "sha=$(git rev-parse origin/main)" >> $GITHUB_OUTPUT
      - name: Set node version
        uses: actions/setup-node@v3
        with:
          node-version: 18.x
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v45
        with:
          base_sha: "${{ steps.base-sha.outputs.sha }}"

      - name: use the split() function
        id: changed-files-names
        run: { { item.split('.') | first } }
        loop: "{{ steps.changed-files.outputs.all_changed_files }}"

      - name: Test all changed files
        env:
          ALL_CHANGED_FILES: ${{ steps.changed-files-names.outputs.all_changed_files }}
        run: |
          yarn test:cover ${ALL_CHANGED_FILES} --passWithNoTests
